server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API requests — proxy to Django backend container
    location /devotional-journal/api/ {
        proxy_pass http://dj-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — strip /devotional-journal prefix so files resolve on disk.
    # e.g. /devotional-journal/assets/index.css → /usr/share/nginx/html/assets/index.css
    location /devotional-journal/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Vite public-dir files (favicon, vite.svg, etc.)
    location /devotional-journal/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Redirect bare sub-path to trailing slash
    location = /devotional-journal {
        return 301 /devotional-journal/;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
