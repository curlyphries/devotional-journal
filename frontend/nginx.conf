server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API requests — proxy to Django backend container
    location /devotional-journal/api/ {
        proxy_pass http://dj-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA — all routes under /devotional-journal/ served from index.html
    location /devotional-journal/ {
        try_files $uri $uri/ /index.html;
    }

    # Redirect bare sub-path to trailing slash
    location = /devotional-journal {
        return 301 /devotional-journal/;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
